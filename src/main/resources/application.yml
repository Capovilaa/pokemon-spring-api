spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pokemondb
    username: admin
    password: admin123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/pokemon
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 600000
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 1024
          temperature: 0.7
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: nomic-embed-text
      chat:
        enabled: false
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 768
    logging:
      level:
        org.springframework.ai: DEBUG

pokeapi:
  base-url: https://pokeapi.co/api/v2
  cache:
    ttl-hours: 24

server:
  port: 8080